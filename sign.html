<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="sign.css">
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <title>Login Form</title>
</head>
<body>
    <div class="wrapper">
        <form id="signup-form">
            <h2><u>Signup Form</u></h2>
            <div class="input-box">
                <span class="icon"><i class="fa-solid fa-user"></i></span>
                <input type="text" placeholder="username" id="signup-username"  required>
            </div>

            <div class="input-box">
                <span class="icon"><i class="fa-solid fa-envelope"></i></span>
                <input type="email" placeholder="email" id="signup-email"  required>
            </div>

             <div class="input-box">
                <span class="icon"><i class="fa-solid fa-lock"></i></span>
                <input type="password" placeholder="password" id="signup-password"  required>
            </div>

            <div class="forget-pass">
            <a href="#">Forget Password?</a>
            </div>
            <button type="submit" class="btn btn-primary" id="signup-btn">Signup</button>
            <bu1tton onclick="signup()"></button>
              
            <div id="signup-message" style="margin-top: 15px; font-weight: bold; text-align: center;"></div>
            <div class="signup-link">
                <p>Already have an account? <a href="index.html">Login</a></p>
            </div>
        </form>

    </div> 
    <script src="sign.js"></script>
</body>
 </html>
